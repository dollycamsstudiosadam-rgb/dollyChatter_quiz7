<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DollyGirls Chatter Training — Section 7 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #000000; --surface: #0d0d0d; --surface2: #161616; --border: #2a2a2a;
    --accent: #ff2ecc; --accent-dim: rgba(255,46,204,0.12); --accent-glow: rgba(255,46,204,0.35);
    --text: #ffffff; --muted: #777777; --success: #ff2ecc; --danger: #ff4466;
    --success-dim: rgba(255,46,204,0.1); --danger-dim: rgba(255,68,102,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -200px; left: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,46,204,0.08) 0%, transparent 70%); pointer-events: none; animation: drift 12s ease-in-out infinite alternate; }
  body::after { content: ''; position: fixed; bottom: -200px; right: -200px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,46,204,0.05) 0%, transparent 70%); pointer-events: none; animation: drift2 15s ease-in-out infinite alternate; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-30px,-40px); } }
  .container { width: 100%; max-width: 680px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 40px; animation: fadeUp 0.6s ease both; }
  .badge { display: inline-block; background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); font-family: 'Nunito', sans-serif; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; padding: 6px 14px; border-radius: 2px; margin-bottom: 20px; }
  h1 { font-family: 'Nunito', sans-serif; font-size: clamp(26px, 5vw, 40px); font-weight: 900; line-height: 1.1; letter-spacing: -0.5px; color: var(--text); }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 12px; margin-top: 10px; letter-spacing: 1px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px; animation: fadeUp 0.6s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .entry-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; display: block; }
  .entry-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; color: var(--text); font-family: 'Nunito Sans', sans-serif; font-size: 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 24px; }
  .entry-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .entry-input::placeholder { color: var(--muted); }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .info-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; }
  .info-box .val { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800; color: var(--accent); }
  .info-box .lbl { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
  .btn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 16px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }
  .btn:active { transform: translateY(0); }
  .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-ghost:hover { background: var(--accent-dim); box-shadow: none; }
  .progress-wrap { margin-bottom: 28px; }
  .progress-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .q-counter { font-size: 11px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .q-counter span { color: var(--accent); font-weight: 600; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; box-shadow: 0 0 8px var(--accent-glow); }
  .section-tag { display: inline-block; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; margin-bottom: 14px; }
  .question-text { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 700; line-height: 1.5; margin-bottom: 24px; color: var(--text); }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s; user-select: none; }
  .option:hover:not(.locked) { border-color: var(--accent); background: var(--accent-dim); transform: translateX(4px); }
  .option.selected { border-color: var(--accent); background: var(--accent-dim); }
  .option.correct { border-color: var(--success); background: var(--success-dim); }
  .option.wrong { border-color: var(--danger); background: var(--danger-dim); }
  .option.locked { cursor: default; pointer-events: none; }
  .opt-letter { min-width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--muted); transition: all 0.2s; flex-shrink: 0; }
  .option.selected .opt-letter { border-color: var(--accent); color: var(--accent); }
  .option.correct .opt-letter { border-color: var(--success); color: var(--success); background: var(--success-dim); }
  .option.wrong .opt-letter { border-color: var(--danger); color: var(--danger); background: var(--danger-dim); }
  .opt-text { font-size: 13px; line-height: 1.5; padding-top: 3px; }
  .feedback { margin-top: 18px; padding: 14px 18px; border-radius: 8px; font-size: 12px; line-height: 1.6; display: none; animation: fadeUp 0.3s ease both; }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: var(--success-dim); border: 1px solid var(--success); color: var(--success); }
  .feedback.wrong-fb { background: var(--danger-dim); border: 1px solid var(--danger); color: var(--danger); }
  .nav { margin-top: 24px; }
  .result-score { text-align: center; padding: 32px 0 24px; }
  .score-ring { position: relative; width: 130px; height: 130px; margin: 0 auto 20px; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring circle { fill: none; stroke-width: 8; stroke-linecap: round; }
  .ring-bg { stroke: var(--border); }
  .ring-fill { transition: stroke-dashoffset 1s ease; }
  .score-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
  .score-num .big { font-family: 'Nunito', sans-serif; font-size: 32px; font-weight: 800; }
  .score-num .pct { font-size: 10px; color: var(--muted); letter-spacing: 2px; }
  .result-label { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .result-sub { font-size: 12px; color: var(--muted); margin-bottom: 28px; }
  .result-breakdown { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }
  .rb-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
  .rb-box .num { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 800; }
  .rb-box .lbl { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
  .rb-box.pass .num { color: var(--success); }
  .rb-box.fail .num { color: var(--danger); }
  .sending-msg { text-align: center; font-size: 11px; color: var(--muted); margin-bottom: 16px; letter-spacing: 1px; }
  .screen { display: none; }
  .screen.active { display: block; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="badge">Section 7 — Managing The Room</div>
    <h1><span>Dolly</span>Girls. Knowledge Quiz</h1>
    <p class="subtitle">Quiet Streams · Busy Streams · Time Wasters · Private Management</p>
  </div>

  <div class="card screen active" id="screen-entry">
    <label class="entry-label" for="tg-input">Your Telegram Username</label>
    <input class="entry-input" id="tg-input" type="text" placeholder="@yourusername" autocomplete="off"/>
    <div class="info-grid">
      <div class="info-box"><div class="val">16</div><div class="lbl">Questions</div></div>
      <div class="info-box"><div class="val">80%</div><div class="lbl">Pass Mark</div></div>
    </div>
    <button class="btn" onclick="startQuiz()">Begin Assessment</button>
  </div>

  <div class="card screen" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-meta">
        <span class="q-counter">Question <span id="q-num">1</span> of <span id="q-total">16</span></span>
        <span class="q-counter"></span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="section-tag" id="section-tag"></div>
    <div class="question-text" id="question-text"></div>
    <div class="options" id="options-list"></div>
    <div class="feedback" id="feedback"></div>
    <div class="nav"><button class="btn" id="next-btn" style="display:none" onclick="nextQuestion()">Next Question →</button></div>
  </div>

  <div class="card screen" id="screen-results">
    <div class="result-score">
      <div class="score-ring">
        <svg viewBox="0 0 120 120" width="130" height="130">
          <circle class="ring-bg" cx="60" cy="60" r="52"/>
          <circle class="ring-fill" id="ring-fill" cx="60" cy="60" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
        </svg>
        <div class="score-num">
          <div class="big" id="score-pct">0%</div>
          <div class="pct">SCORE</div>
        </div>
      </div>
      <div class="result-label" id="result-label"></div>
      <div class="result-sub" id="result-sub"></div>
    </div>
    <div class="result-breakdown">
      <div class="rb-box pass"><div class="num" id="r-correct">0</div><div class="lbl">Correct</div></div>
      <div class="rb-box fail"><div class="num" id="r-wrong">0</div><div class="lbl">Incorrect</div></div>
    </div>
    <div class="sending-msg" id="sending-msg">Saving your result...</div>
    <button class="btn btn-ghost" onclick="retryQuiz()">Retake Quiz</button>
  </div>

</div>
<script>
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwtD6KkKFgbk4oC2BTnQNWP6xbjUrYQp3gWt0zjGDIj3enzmR_z8dnVL38hAz9Nw0dx/exec";
const SECTION_NAME = "Section 7 – Managing The Room";
const TOTAL = 16;

const questions = [

  // ── MANAGING WHEN QUIET (4)
  {
    section: "Quiet Streams",
    q: "What is the core loop you should constantly be running during a quiet stream?",
    opts: [
      "Wait for fans to message first, then reply and push to private",
      "New fan joins → check level/tokens → message → reply to spenders → push toward private → repeat",
      "Focus only on existing conversations until the room fills up naturally",
      "Prioritise updating the room topic over messaging individual fans"
    ],
    ans: 1,
    fb: "The core loop is: new fan joins → check level/tokens → message → reply to spenders → push toward private → repeat. This should be running constantly. Speed is everything — the quicker you identify spenders, the more revenue is generated."
  },
  {
    section: "Quiet Streams",
    q: "On MyFreeCams you cannot see levels or colours. What is the recommended strategy for managing viewers?",
    opts: [
      "Only message fans who have a premium badge and ignore everyone else",
      "Wait for fans to tip before engaging so you know who is worth your time",
      "Message everyone, then quickly filter — prioritise premium badge users when busy",
      "Focus on the public chat only and do not send private messages"
    ],
    ans: 2,
    fb: "On MFC you cannot rely on colour or level, so message everyone first then filter quickly. Premium badge users should be prioritised when busy as they are more likely to spend. Cut off time wasters quickly once identified."
  },
  {
    section: "Quiet Streams",
    q: "On StripChat, a fan has a high level but their token balance is hidden. Should you still engage with them?",
    opts: [
      "No — a hidden balance means they are unlikely to spend",
      "Yes — high level and colour indicate spending history on the platform. A hidden balance is a privacy setting, not a sign they cannot spend",
      "Only if they have a premium badge as well",
      "Only if they have spent with this specific model before"
    ],
    ans: 1,
    fb: "A hidden token balance on StripChat is a privacy setting, not a poverty signal. High colour and level indicate spending history on the platform — these users are worth engaging. Check their historical spending if available and approach them warmly."
  },
  {
    section: "Quiet Streams",
    q: "What is one of the most common mistakes chatters make when managing viewers?",
    opts: [
      "Messaging too many fans at once",
      "Getting stuck chatting with one low-value viewer while high-value fans go ungreeted",
      "Spending too much time checking token balances before messaging",
      "Sending private messages too quickly after a fan joins"
    ],
    ans: 1,
    fb: "Getting stuck in a long conversation with a low-value viewer while high-value fans join and go ungreeted is one of the most common and costly mistakes. Always keep an eye on who is joining — do not let a time-wasting conversation cost you a spender."
  },

  // ── MANAGING WHEN BUSY (3)
  {
    section: "Busy Streams",
    q: "When the stream is very busy, what is the correct priority order for your attention?",
    opts: [
      "New joiners first, then existing conversations, then tippers",
      "Fans already spending or about to spend → fans with token balances → higher-level/colour fans",
      "Highest-level fans first, regardless of whether they are currently spending",
      "All fans equally — busy streams require you to spread attention evenly"
    ],
    ans: 1,
    fb: "During a busy stream your priority order is: (1) fans already spending or clearly about to — keep them flowing, (2) fans with token balances — they are ready to spend, (3) higher-level/colour fans. Your time always goes where revenue is most likely."
  },
  {
    section: "Busy Streams",
    q: "Should you stop greeting new high-value joiners when the stream is very busy?",
    opts: [
      "Yes — during peak times focus entirely on existing conversations",
      "No — even when busy, send a quick greeting to higher-level fans who join. Small touches can turn a viewer into a spender",
      "Only greet them if they have previously spent with the model",
      "Only greet them if no other conversations are currently active"
    ],
    ans: 1,
    fb: "Even during a busy stream you should not go fully reactive. When a higher-level or valuable fan joins, send a quick, simple greeting. It makes them feel noticed and can turn a viewer into a spender. Keep it short — 'hey' or a brief personal opener is enough."
  },
  {
    section: "Busy Streams",
    q: "The stream becomes overwhelming — chats are piling up and you are losing control of the flow. What should you do?",
    opts: [
      "Stop replying to lower-value fans immediately and handle it yourself",
      "Message a manager immediately so they can help you catch up — it is always better to ask early than fall behind",
      "Close the lower-priority chat tabs to reduce the workload",
      "Focus only on the fan closest to a private and ignore everything else temporarily"
    ],
    ans: 1,
    fb: "If you ever feel like you cannot keep up, message a manager immediately. It is always better to ask for help early than fall behind and miss revenue. Busy streams are a good thing — they mean opportunity — but you need to manage the pace."
  },

  // ── TIME WASTERS (5)
  {
    section: "Time Wasters",
    q: "What is the 3-Strike Rule and what happens after all three strikes are used?",
    opts: [
      "Three strikes means three separate sessions — after three sessions with no spend, block the fan",
      "One private invite, one 'invite me', one subtle hint — if all three are ignored or deflected, deprioritise the fan and reduce investment",
      "Three direct private asks in the same conversation — if refused, end the conversation",
      "Three tip requests — if none land, move the fan to the ignore list permanently"
    ],
    ans: 1,
    fb: "The 3-Strike Rule is: Strike 1 — one private invite, Strike 2 — one casual 'invite me', Strike 3 — one subtle hint. If all three are deflected or ignored, the fan is classified as a time waster for the session. You then apply gradual withdrawal — not a cut-off, just reduced investment."
  },
  {
    section: "Time Wasters",
    q: "After classifying a fan as a time waster, what does the gradual withdrawal involve?",
    opts: [
      "Blocking them and removing them from the room",
      "Telling them directly that you will not be investing more time in them",
      "Slowing replies, shortening messages, removing flirty escalation, and shifting focus to higher-value fans — while keeping the door open",
      "Ignoring them completely and never responding again"
    ],
    ans: 2,
    fb: "Gradual withdrawal means: slow your replies, shorten your messages, remove flirty escalation, and shift focus to higher-value fans. Crucially, if they tip or show clear intent, re-engage immediately. You are reallocating attention — not punishing them or burning the relationship."
  },
  {
    section: "Time Wasters",
    q: "A fan keeps asking for lower prices every time a private is mentioned. What is the correct response?",
    opts: [
      "Negotiate slightly to keep them engaged — a smaller private is better than none",
      "Never change private prices — hold firm every time. Lowering prices rewards the behaviour",
      "Offer a discount once to test if they convert, then return to standard pricing",
      "Ask the model if she is willing to do a cheaper show for this fan"
    ],
    ans: 1,
    fb: "Never change private prices. Hold firm every time. Negotiating down rewards the behaviour and signals that prices are flexible, which creates a pattern you cannot control. One of the key rules is: never change private prices — ever."
  },
  {
    section: "Time Wasters",
    q: "What is the Pull Back Technique and when should it be used?",
    opts: [
      "Physically removing a fan from the room if they are causing disruption",
      "Reducing attention and visibly focusing on others to trigger spending from a fan with genuine emotional investment",
      "Pulling back your private invite after sending it to create urgency",
      "Stepping back from all conversations during a quiet moment to reset focus"
    ],
    ans: 1,
    fb: "The Pull Back Technique means reducing your attention and visibly focusing on others. With fans who have spent before or show genuine emotional attachment, this can trigger spending — they tip to regain attention. Use it only when you sense real emotional investment. Never use it aggressively or repeatedly on the same fan."
  },
  {
    section: "Time Wasters",
    q: "Why should you never be rude to a time waster or call them out directly?",
    opts: [
      "Platform rules prohibit negative interactions with viewers",
      "A time waster today can become a spender in two weeks — never burn the relationship. Always keep the door open",
      "It reflects poorly on the model's public image in the room",
      "Management may be monitoring the chat and it would look unprofessional"
    ],
    ans: 1,
    fb: "A time waster today can become a spender in two weeks. Never be rude, never argue, and never call them out. You are reallocating your energy — not punishing them. Always keep the door open. The relationship must stay intact in case they return with intent to spend."
  },

  // ── PRIVATE MANAGEMENT (4)
  {
    section: "Private Management",
    q: "As soon as a private invite comes in, what information must you immediately give the model?",
    opts: [
      "Just the fan's username and which platform the invite came from",
      "The fan's username, which platform, what they want, and how many tokens they have available",
      "The token count only — the model will ask for other details if she needs them",
      "A screenshot of their most recent messages"
    ],
    ans: 1,
    fb: "As soon as a private invite arrives, tell the model: the fan's username, which platform the invite came from (especially important when multi-streaming), what the fan wants to do, and how many tokens they have available. Full context helps the model decide quickly and keeps everything professional."
  },
  {
    section: "Private Management",
    q: "Once a private show starts, what must you immediately check across all other platforms?",
    opts: [
      "That the model's tip menu is up to date on all platforms",
      "That all other platforms are set to spy mode so viewers cannot watch the private for free",
      "That you have logged the private session start time in the notes",
      "That the room topic reflects that the model is currently in a private"
    ],
    ans: 1,
    fb: "As soon as the private starts, make sure all other platforms are set to spy mode. This protects earnings, keeps things fair across platforms, and prevents the platforms from getting banned. Double-check this every time — it is an important step."
  },
  {
    section: "Private Management",
    q: "What should you be doing with your time while the model is in a private show?",
    opts: [
      "Wait and monitor the private until it ends before doing anything else",
      "Catch up on other chats, build rapport with other fans, warm up potential spenders, and try to line up the next private",
      "Only message fans who are currently spying on the private",
      "Update the model's profile settings while she is occupied"
    ],
    ans: 1,
    fb: "Use private show time productively. Catch up on outstanding chats, build rapport with other fans in the room, warm up potential spenders, and try to line up the next private for when the current one ends. You can only be in one private at a time — use the window to prepare what's next."
  },
  {
    section: "Private Management",
    q: "What does 'Password Show = Never' mean?",
    opts: [
      "Never share the model's account password with anyone",
      "Never run a password show — it means a free private. Do not run them unless explicitly instructed",
      "Never allow fans to set a custom password for their private session",
      "Never enter a password-protected room on behalf of the model"
    ],
    ans: 1,
    fb: "Password Show = Never means do not run password shows. A password show is effectively a free private — the fan gets the show without paying tokens. Never run one unless you have been explicitly instructed to by management."
  }

];

// ── STATE
let telegramName = "", currentQ = 0, score = 0, answered = false, shuffled = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  const raw = document.getElementById('tg-input').value.trim();
  if (!raw) { document.getElementById('tg-input').focus(); return; }
  telegramName = raw.startsWith('@') ? raw : '@' + raw;
  shuffled = shuffle(questions);
  currentQ = 0; score = 0;
  showScreen('screen-quiz');
  renderQuestion();
}

document.getElementById('tg-input').addEventListener('keydown', e => { if (e.key === 'Enter') startQuiz(); });

function renderQuestion() {
  answered = false;
  const q = shuffled[currentQ];
  const letters = ['A','B','C','D'];
  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('section-tag').textContent = q.section;
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = ((currentQ / TOTAL) * 100) + '%';
  document.getElementById('next-btn').style.display = 'none';
  const fb = document.getElementById('feedback');
  fb.className = 'feedback'; fb.textContent = '';
  const list = document.getElementById('options-list');
  list.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<div class="opt-letter">${letters[i]}</div><div class="opt-text">${opt}</div>`;
    div.onclick = () => selectAnswer(i);
    list.appendChild(div);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = shuffled[currentQ];
  const options = document.querySelectorAll('.option');
  options.forEach(o => o.classList.add('locked'));
  options[idx].classList.add('selected');
  const fb = document.getElementById('feedback');
  if (idx === q.ans) {
    score++;
    options[idx].classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.textContent = '✓ Correct — ' + q.fb;
  } else {
    options[idx].classList.add('wrong');
    options[q.ans].classList.add('correct');
    fb.className = 'feedback wrong-fb show';
    fb.textContent = '✗ Incorrect — ' + q.fb;
  }
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  currentQ++;
  if (currentQ < TOTAL) { renderQuestion(); } else { showResults(); }
}

function showResults() {
  showScreen('screen-results');
  const pct = Math.round((score / TOTAL) * 100);
  const passed = pct >= 80;
  document.getElementById('score-pct').textContent = pct + '%';
  document.getElementById('score-pct').style.color = passed ? 'var(--success)' : 'var(--danger)';
  document.getElementById('r-correct').textContent = score;
  document.getElementById('r-wrong').textContent = TOTAL - score;
  document.getElementById('result-label').textContent = passed ? '🎉 You Passed!' : '❌ Not Quite';
  document.getElementById('result-label').style.color = passed ? 'var(--success)' : 'var(--danger)';
  document.getElementById('result-sub').textContent = passed
    ? `Great work, ${telegramName}. You're cleared to move forward.`
    : `${telegramName}, you needed 80% to pass. Review the material and try again.`;
  const ring = document.getElementById('ring-fill');
  ring.style.stroke = passed ? 'var(--success)' : 'var(--danger)';
  setTimeout(() => { ring.style.strokeDashoffset = 326.7 - (326.7 * pct / 100); }, 100);
  sendToSheets(telegramName, pct, score, passed);
}

function retryQuiz() {
  shuffled = shuffle(questions);
  currentQ = 0; score = 0;
  showScreen('screen-quiz');
  renderQuestion();
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function sendToSheets(telegram, pct, correct, passed) {
  const msg = document.getElementById('sending-msg');
  if (!WEBHOOK_URL || WEBHOOK_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
    msg.textContent = "⚠ No webhook configured — result not saved.";
    return;
  }
  try {
    await fetch(WEBHOOK_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        telegram, section: SECTION_NAME, score: pct,
        correct, wrong: TOTAL - correct,
        passed: passed ? "PASS" : "FAIL",
        timestamp: new Date().toISOString()
      })
    });
    msg.textContent = "✓ Result saved successfully.";
  } catch (e) {
    msg.textContent = "⚠ Could not save result — check webhook URL.";
  }
}
</script>
